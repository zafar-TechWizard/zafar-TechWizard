<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Scanline pattern to slice text -->
    <pattern id="scanline-pattern" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="white" />
    </pattern>
    
    <!-- Mask using the scanline pattern -->
    <mask id="scanline-mask">
      <rect width="900" height="180" fill="url(#scanline-pattern)" />
    </mask>
    
    <!-- Fractal horizontal noise displacement filter -->
    <filter id="scanline-glitch" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.0 0.32" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@900&amp;display=swap');
      .glitch-text {
        font-family: 'Unbounded', sans-serif;
        font-weight: 900;
        font-size: 92px;
        fill: #FFFFFF;
        text-anchor: middle;
        letter-spacing: 6px;
        filter: drop-shadow(0px 0px 8px rgba(123, 47, 247, 0.75));
      }
    </style>
  </defs>

  <!-- Dark mode background matching GitHub interface -->
  <rect width="900" height="180" fill="#0D1117" rx="6" />

  <!-- Render text with scanlines and horizontal jitter -->
  <g filter="url(#scanline-glitch)">
    <text x="450" y="122" class="glitch-text" mask="url(#scanline-mask)">Zafar</text>
  </g>
</svg>