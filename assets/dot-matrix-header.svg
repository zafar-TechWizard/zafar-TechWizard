<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Scanline pattern to slice text -->
    <pattern id="scanline-pattern" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="white" />
    </pattern>
    
    <!-- Mask using the scanline pattern -->
    <mask id="scanline-mask">
      <rect width="900" height="180" fill="url(#scanline-pattern)" />
    </mask>
    
    <!-- Fractal horizontal noise displacement filter -->
    <filter id="scanline-glitch" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.0 0.35" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="16" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,900&amp;display=swap');
      .glitch-text {
        font-family: 'Montserrat', 'Helvetica Neue', sans-serif;
        font-style: italic;
        font-weight: 900;
        font-size: 110px;
        fill: #0F172A;
        text-anchor: middle;
      }
    </style>
  </defs>

  <!-- Clean light gray background matching the image style -->
  <rect width="900" height="180" fill="#F1F5F9" rx="6" />

  <!-- Render text with scanlines and horizontal jitter -->
  <g filter="url(#scanline-glitch)">
    <text x="450" y="125" class="glitch-text" mask="url(#scanline-mask)">Zafar</text>
  </g>
</svg>